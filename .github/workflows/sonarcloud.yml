name: SonarCloud

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze:
    if: false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}